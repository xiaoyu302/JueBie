name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install
          npx cap sync ios

      - name: Debug - Show Project State
        run: |
          echo "=== Files in ios/App ==="
          ls -la ios/App/
          echo ""
          echo "=== Podfile ==="
          cat ios/App/Podfile 2>/dev/null || echo "No Podfile"
          echo ""
          echo "=== Workspace ==="
          ls ios/App/*.xcworkspace 2>/dev/null || echo "No workspace"
          echo ""
          echo "=== Xcode version ==="
          xcodebuild -version
          echo ""
          echo "=== Available schemes ==="
          cd ios/App && xcodebuild -list 2>&1 || true

      - name: Install Pods
        run: |
          cd ios/App
          pod install --verbose 2>&1 | tail -30

      - name: Build IPA
        run: |
          cd ios/App
          
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -50
          
          echo "Build exit: ${PIPESTATUS[0]}"
          
          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/ 2>/dev/null || echo "No .app found"
          
          if [ -d "Payload/App.app" ]; then
            cd Payload
            zip -r ../../App.ipa App.app
            cd ..
            ls -la ../App.ipa
          else
            find build -name "*.app" -type d 2>/dev/null
          fi

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
