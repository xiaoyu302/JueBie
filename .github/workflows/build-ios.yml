name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor & Pods
        run: |
          npm install
          npx cap sync ios
          cd ios/App
          pod cache clean --all 2>/dev/null || true
          pod install

      - name: Build App
        run: |
          cd ios/App
          
          echo "=== Xcode ==="
          xcodebuild -version
          
          echo "=== Schemes ==="
          xcodebuild -workspace App.xcworkspace -list
          
          echo "=== Building ==="
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee build.log
          
          EC=${PIPESTATUS[0]}
          echo "Exit: $EC"
          tail -30 build.log
          
          if [ $EC -ne 0 ]; then exit 1; fi
          
          APP_PATH=$(find build -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d | head -1)
          fi
          echo "App: $APP_PATH"
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ../../App.ipa Payload
          ls -la ../../App.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
