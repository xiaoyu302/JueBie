name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install || pod install || pod install
          echo "Pod install done"

      - name: Build App
        run: |
          cd ios/App
          
          # Build
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee build.log
          
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Build exit: $BUILD_EXIT"
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD FAILED - Last 60 lines ==="
            tail -60 build.log
            exit 1
          fi
          
          # Find .app
          APP_PATH=$(find build -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          echo "App path: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "App not found, searching..."
            find build -name "*.app" -type d
            exit 1
          fi
          
          # Create IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ../../App.ipa Payload
          ls -la ../../App.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
