name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy HTML to App Bundle
        run: |
          cp www/index.html ios/App/App/index.html
          echo "HTML copied to app bundle"

      - name: Build iOS IPA
        run: |
          cd ios/App
          
          # Build using xcodeproj directly (no CocoaPods needed)
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_VERSION=5.0 \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r ../../App.ipa Payload
          
          echo "IPA created!"
          ls -la ../../App.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
