name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Environment
        run: |
          xcodebuild -version
          swift --version
          xcrun --sdk iphoneos --show-sdk-path
          ls /Applications/Xcode*.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/ 2>/dev/null || echo "No SDKs found"

      - name: Build IPA with xcodebuild
        run: |
          cd ios/App
          
          # First, fix the pbxproj by removing SPM dependencies more carefully
          # Backup
          cp App.xcodeproj/project.pbxproj App.xcodeproj/project.pbxproj.bak
          
          # Use python to clean the pbxproj properly
          python3 << 'PYEOF'
          import re
          
          with open('App.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          
          # Remove lines containing CapApp-SPM
          lines = content.split('\n')
          new_lines = []
          skip_section = False
          skip_count = 0
          
          for line in lines:
              # Skip sections
              if 'XCLocalSwiftPackageReference' in line:
                  skip_section = True
                  skip_count = 2
                  continue
              if 'XCSwiftPackageProductDependency' in line:
                  skip_section = True
                  skip_count = 2
                  continue
              if 'packageReferences' in line:
                  continue
              if 'packageProductDependencies' in line:
                  continue
              if 'CapApp-SPM' in line:
                  continue
              if 'debug.xcconfig' in line and 'baseConfigurationReference' in line:
                  continue
              if 'COCOAPODS' in line:
                  # Fix the OTHER_SWIFT_FLAGS line
                  line = '\t\t\t\tOTHER_SWIFT_FLAGS = \"$(inherited)\";'
              
              if skip_section:
                  skip_count -= 1
                  if skip_count <= 0:
                      skip_section = False
                  continue
              
              new_lines.append(line)
          
          with open('App.xcodeproj/project.pbxproj', 'w') as f:
              f.write('\n'.join(new_lines))
          
          print("pbxproj cleaned")
          PYEOF
          
          # List available targets/schemes
          echo "=== Available targets ==="
          xcodebuild -project App.xcodeproj -list 2>&1 || true
          
          # Build
          xcodebuild \
            -project App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -50
          
          echo "Build exit code: ${PIPESTATUS[0]}"
          
          # Find the .app
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r ../../App.ipa Payload
            ls -la ../../App.ipa
          else
            echo "No .app found!"
            find build -type d | head -20
            exit 1
          fi

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
