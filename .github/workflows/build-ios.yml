name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Project
        run: |
          cd ios/App
          
          # Remove SPM references
          sed -i '' '/CapApp-SPM/d' App.xcodeproj/project.pbxproj
          sed -i '' '/XCLocalSwiftPackageReference/,/End/d' App.xcodeproj/project.pbxproj
          sed -i '' '/XCSwiftPackageProductDependency/,/End/d' App.xcodeproj/project.pbxproj
          sed -i '' '/packageReferences/d' App.xcodeproj/project.pbxproj
          sed -i '' '/packageProductDependencies/d' App.xcodeproj/project.pbxproj
          sed -i '' '/debug.xcconfig/d' App.xcodeproj/project.pbxproj
          
          # Remove COCOAPODS flags
          sed -i '' 's/OTHER_SWIFT_FLAGS.*COCOAPODS.*/OTHER_SWIFT_FLAGS = \"\$(inherited)\";/' App.xcodeproj/project.pbxproj
          
          echo "=== Available targets ==="
          xcodebuild -project App.xcodeproj -list
          
          echo "Project fixed"

      - name: Copy HTML
        run: |
          cp www/index.html ios/App/App/index.html

      - name: Build IPA
        run: |
          cd ios/App
          
          xcodebuild \
            -project App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO
          
          echo "Build exit: $?"
          
          mkdir -p Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r ../../App.ipa Payload
          ls -la ../../App.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
