name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Sync Capacitor
        run: |
          npm install
          npx cap sync ios

      - name: Build iOS IPA (Archive + Export)
        run: |
          cd ios/App
          
          echo "=== Xcode Version ==="
          xcodebuild -version
          
          echo "=== Creating exportOptions.plist ==="
          cat > exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string></string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Development</string>
              <key>provisioningProfiles</key>
              <dict/>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
          </dict>
          </plist>
          PLIST
          cat exportOptions.plist
          
          echo "=== Archiving App ==="
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            archive 2>&1 | tee archive.log
          
          EC=${PIPESTATUS[0]}
          echo "=== Archive Exit Code: $EC ==="
          
          if [ $EC -ne 0 ]; then 
            echo "ARCHIVE FAILED!"
            tail -50 archive.log
            exit 1
          fi
          
          echo "=== Exporting IPA ==="
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates \
            2>&1 | tee export.log
          
          EC=${PIPESTATUS[0]}
          echo "=== Export Exit Code: $EC ==="
          
          if [ $EC -ne 0 ]; then
            echo "=== Export failed, falling back to manual IPA packaging ==="
            echo "=== Finding .app in xcarchive ==="
            APP_PATH=$(find build/App.xcarchive -name "*.app" -type d 2>/dev/null | head -1)
            echo "APP_PATH: $APP_PATH"
            
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -R "$APP_PATH" Payload/
              zip -r ../../App.ipa Payload
              ls -la ../../App.ipa
              echo "Manual IPA created successfully!"
            else
              echo "ERROR: No .app bundle found!"
              exit 1
            fi
          else
            echo "=== Export successful ==="
            ls -la build/export/
            cp build/export/*.ipa ../../App.ipa 2>/dev/null || true
            ls -la ../../App.ipa
          fi

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
