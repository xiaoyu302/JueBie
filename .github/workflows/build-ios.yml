name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install
          npx cap sync ios

      - name: Install Pods
        run: |
          cd ios/App
          pod install

      - name: Build
        run: |
          cd ios/App
          
          # Build without archiving - just create .app in derived data
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build \
            2>&1 | tail -30
          
          echo "Build exit: ${PIPESTATUS[0]}"
          
          # Find .app
          APP_PATH=$(find build -name "*.app" -path "*/Release-iphoneos/*" -type d | head -1)
          echo "App: $APP_PATH"
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r ../../App.ipa Payload
            ls -la ../../App.ipa
            echo "IPA CREATED!"
          else
            echo "No .app found. Listing build dir:"
            find build -maxdepth 4 -type d 2>/dev/null | head -30
            exit 1
          fi

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
