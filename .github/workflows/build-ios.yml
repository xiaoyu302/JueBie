name: Build iOS IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Sync Capacitor
        run: |
          npm install
          npx cap sync ios

      - name: Build iOS IPA
        run: |
          cd ios/App
          
          echo "=== Xcode Version ==="
          xcodebuild -version
          
          echo "=== Building App (unsigned) ==="
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee build.log
          
          EC=${PIPESTATUS[0]}
          echo "=== Build Exit Code: $EC ==="
          
          if [ $EC -ne 0 ]; then 
            echo "BUILD FAILED!"
            tail -50 build.log
            exit 1
          fi
          
          echo "=== Finding .app ==="
          find build -name "*.app" -type d 2>/dev/null
          
          APP_PATH=$(find build -name "App.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          fi
          echo "APP_PATH: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            exit 1
          fi
          
          echo "=== Creating unsigned IPA (for third-party re-signing) ==="
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          echo "=== App bundle contents ==="
          ls -la Payload/App.app/
          
          zip -r ../../App.ipa Payload
          ls -la ../../App.ipa
          echo ""
          echo "============================================="
          echo "IPA created successfully!"
          echo "This is an UNSIGNED IPA. Use these tools to sign and install:"
          echo "  - 爱思助手 (i4Tools) on Windows"
          echo "  - AltStore / AltServer"
          echo "  - iOS App Signer on Mac"
          echo "  - Sideloadly"
          echo "============================================="

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JueBie-iOS
          path: App.ipa
          retention-days: 7
